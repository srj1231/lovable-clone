spring:
  application:
    name: lovable-clone

  datasource:
    url: jdbc:postgresql://localhost:9000/<db-name>
    username: <username>
    password: <password>
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
#      ddl-auto: create - it creates all tables from scratch
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: <yourSecretKey>

stripe:
  secret: <yourSecretKey>
  webhook: <your webhook secret> # set up using 1. stripe login, 2. stripe listen --forward-to localhost:8080/webhooks/payment
#  since our application is on localhost, so BE cannot receive the webhook requests. We need to use stripe listen from OS, then forward the requests to our application.

client.url: http://localhost:8080